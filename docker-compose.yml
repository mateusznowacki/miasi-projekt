version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres-miasi
    environment:
      POSTGRES_USER: miasi
      POSTGRES_PASSWORD: miasi
      POSTGRES_DB: miasi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
